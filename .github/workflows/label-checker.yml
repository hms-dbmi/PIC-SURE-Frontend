name: Label Checker
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

jobs:
  check_labels:
    name: Check labels
    runs-on: ubuntu-latest
    steps:
      - uses: docker://agilepathway/pull-request-label-checker:sha-c3d16ad
      # https://github.com/agilepathway/label-checker/releases/tag/v1.6.65
        with:
          any_of: breaking-change,enhancement,bug,documentation,ignore-for-release,dependencies
          repo_token: ${{ secrets.GITHUB_TOKEN }}
