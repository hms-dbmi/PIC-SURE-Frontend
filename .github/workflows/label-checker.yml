name: Label Checker
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

jobs:
  check_labels:
    name: Check labels
    runs-on: ubuntu-latest
    steps:
      - uses: docker://agilepathway/pull-request-label-checker@sha256:7506b198121c51b7909bd5fe928f4520b0787bb40dfb6796f0e591aa26b3c43c # v1.6.65
        with:
          any_of: breaking-change,enhancement,bug,documentation,ignore-for-release,dependencies
          repo_token: ${{ secrets.GITHUB_TOKEN }}
