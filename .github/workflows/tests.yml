name: Tests
on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Use Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        # https://github.com/actions/setup-node/releases/tag/v4.4.0
        with:
          node-version: 20
      - name: Use PNPM 10
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320
        # https://github.com/pnpm/action-setup/releases/tag/v4.4.0
        with:
          version: 10
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        # https://github.com/actions/checkout/releases/tag/v4.3.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Sync SvelteKit
        run: pnpm svelte-kit sync
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Check Playwright versions
        run: pnpm ls @playwright/test || true
      - name: Run PNPM audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Run linting tests
        run: pnpm run lint
      - name: Run Svelte check
        run: pnpm run check
      - name: Run Playwright tests
        run: pnpm run test

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      # https://github.com/actions/upload-artifact/releases/tag/v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
